name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        env:
          CI: false
          PUBLIC_URL: /GlowUps/pr-preview/pr-${{ github.event.number }}
        run: npm run build

      - name: Deploy PR preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/build
          destination_dir: pr-preview/pr-${{ github.event.number }}
          keep_files: true

      - name: Post or update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://willtalbot80.github.io/GlowUps/pr-preview/pr-${prNumber}`;
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n### 🔍 PR Preview\n\nPreview is ready! 🚀\n\n🔗 **URL:** ${previewUrl}\n\n_Last updated: ${new Date().toUTCString()}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "pr-preview/pr-${{ github.event.number }}" ]; then
            git rm -rf "pr-preview/pr-${{ github.event.number }}"
            git commit -m "chore: remove PR preview for #${{ github.event.number }}"
            git push
          else
            echo "No preview directory found for PR #${{ github.event.number }}, nothing to clean up."
          fi
